<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Peter Askey">
    <title>Askeynet home</title>
    <link rel="stylesheet" href="styles/style.css"/>
</head>
<body>
    <div id="desktop_layout">
        <div id="header">
            <h1>Askey</h1>
        </div>
        <div id="nav-container">
            <div id="nav-button-container">
                <div class="column">
                    <div id="about" class="nav-button">
                        <p>About</p>
                    </div>
                    <div id="code" class="nav-button">
                        <p>Code</p>
                    </div>
                    <div id="art" class="nav-button">
                        <p>Art</p>
                    </div>

                </div>
                <div class="column">
                    <div id="blog" class="nav-button">
                        <p>Blog</p>
                    </div>
                    <div id="games" class="nav-button">
                        <p>Games</p>
                    </div>
                </div>
            </div>
            <div id="gallery">
                <div class="gallery-item">
                    <img src="public/art/Mouse_and_Rabbit.png"/>
                </div>
                <div class="gallery-item">
                    <img src="public/art/Mouse_16x16.png"/>
                </div>
                <div class="gallery-item">
                    <img src="public/art/CityScape1.gif"/>
                </div>
                <div class="gallery-item">
                    <img src="public/art/frog.png"/>
                </div>
                <div class="gallery-item">
                    <img src="public/art/Butterfly.png"/>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
